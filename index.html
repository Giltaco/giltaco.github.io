<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo Nelida 💄</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff7f9;
      text-align: center;
    }

    header {
      background: #e8b4b8;
      padding: 20px;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .producto {
      background: white;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
    }

    .precio {
      color: #e8b4b8;
      font-weight: bold;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  Catálogo Nelida 💄
</header>

<div class="container">

  <div class="producto">
    <img src="https://via.placeholder.com/200" alt="Labial">
    <h3>Labial Matte</h3>
    <p class="precio">$120</p>
    <a class="btn" href="https://wa.me/521XXXXXXXXXX" target="_blank">
      Pedir
    </a>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/200" alt="Base">
    <h3>Base Líquida</h3>
    <p class="precio">$250</p>
    <a class="btn" href="https://wa.me/521XXXXXXXXXX" target="_blank">
      Pedir
    </a>
  </div>

</div>

</body>
</html>
